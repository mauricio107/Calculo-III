<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo III - Optimización</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f9; 
        }
        
        .card { 
            background: white; 
            padding: 2rem; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            margin-top: 50px;
            z-index: 1;
        }

        input { padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; width: 80px; }
        button { padding: 10px 20px; background-color: #2ea44f; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #2c974b; }
        #resultado { margin-top: 20px; font-weight: bold; font-size: 1.2rem; color: #333; }

        /* --- SECCIÓN DE PATROCINIO --- */
        .footer-patrocinio {
            margin-top: auto; /* Empuja el footer al fondo */
            width: 100%;
            background-color: #ffffff;
            border-top: 1px solid #ddd;
            padding: 15px 0;
            text-align: center;
            font-size: 0.9rem;
            color: #666;
        }

        /* --- BOTÓN DE MANO (SECRET ACCESS) --- */
        .admin-button {
            position: fixed;
            right: 20px;
            bottom: 70px; /* Arriba del área de patrocinio */
            
            /* Ajusta el tamaño del contenedor según el tamaño real de tu mano */
            width: 80px;  
            height: 80px;
            
            cursor: pointer;
            z-index: 100; /* Asegura que esté por encima de otros elementos */

            /* --- ESTILOS DE IMAGEN DE FONDO --- */
            background-image: url('admin-hand.png'); 
            background-size: contain; /* Ajusta la imagen para que quepa entera sin cortarse */
            background-repeat: no-repeat; /* No repetir la imagen */
            background-position: center bottom; /* Centrada horizontalmente, pegada abajo */
            background-color: transparent; /* QUITAMOS EL COLOR DE RESPALDO */

            /* --- ELIMINAR EL CUADRO --- */
            border: none; /* QUITAMOS EL BORDE */
            box-shadow: none; /* QUITAMOS LA SOMBRA INICIAL */
            border-radius: 0; /* QUITAMOS EL REDONDEO (ya no es necesario) */
            
            /* Mantener transiciones para efectos de hover */
            transition: transform 0.2s, filter 0.2s;
        }

        /* Efecto sutil al pasar el mouse para indicar que es clickeable */
        .admin-button:hover {
            transform: scale(1.1); /* Se agranda un poco */
            filter: brightness(1.2); drop-shadow(0 4px 6px rgba(0,0,0,0.3)); /* Sombra suave SOLO alrededor de la mano, no del cuadrado */
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Sumador Simple</h2>
    <input type="number" id="num1" placeholder="N° 1">
    <span> + </span>
    <input type="number" id="num2" placeholder="N° 2">
    <button onclick="sumar()">Sumar</button>
    <div id="resultado">Resultado: -</div>
</div>

<div class="admin-button" title="Acceso Restringido" onclick="accesoPrivado()"></div>

<footer class="footer-patrocinio">
    <div>Patrocinado por: <strong>Tu Proyecto de Ingeniería / Kugeln.io Dev</strong></div>
    <div style="font-size: 0.7rem; margin-top: 5px;">© 2026 - Todos los derechos reservados</div>
</footer>

<script>
    function sumar() {
        const n1 = parseFloat(document.getElementById('num1').value);
        const n2 = parseFloat(document.getElementById('num2').value);
        const res = document.getElementById('resultado');
        
        if (isNaN(n1) || isNaN(n2)) {
            res.innerText = "Por favor, ingresa dos números.";
        } else {
            const suma = n1 + n2;
            res.innerText = "Resultado: " + suma;
        }
    }

    // Lógica de Contraseña
    function accesoPrivado() {
        const pass = prompt("Introduce la clave de acceso:");
        
        // Ejemplo simple de validación
        if (pass === "41876216") {
            alert("Acceso concedido. Redirigiendo...");
            window.location.href = "admin.html";
        } else if (pass !== null) {
            alert("Clave incorrecta.");
        }
    }
</script>

</body>
</html>
