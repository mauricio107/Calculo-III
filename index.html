<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo III - Optimización</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; width: 80px; }
        button { padding: 10px 20px; background-color: #2ea44f; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #2c974b; }
        #resultado { margin-top: 20px; font-weight: bold; font-size: 1.2rem; color: #333; }
    </style>
</head>
<body>

<div class="card">
    <h2>Sumador Simple</h2>
    <input type="number" id="num1" placeholder="N° 1">
    <span> + </span>
    <input type="number" id="num2" placeholder="N° 2">
    <button onclick="sumar()">Sumar</button>
    <div id="resultado">Resultado: -</div>
</div>

<script>
    function sumar() {
        const n1 = parseFloat(document.getElementById('num1').value);
        const n2 = parseFloat(document.getElementById('num2').value);
        const res = document.getElementById('resultado');
        
        if (isNaN(n1) || isNaN(n2)) {
            res.innerText = "Por favor, ingresa dos números.";
        } else {
            const suma = n1 + n2;
            res.innerText = "Resultado: " + suma;
        }
    }
</script>

</body>
</html>
